<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LoL チャンピオン リンク集 (ARAM)</title>
<style>
  :root{
    --bg:#0a0e16; --panel:#141b27; --panel2:#1b2433; --line:#243144;
    --text:#e6edf6; --muted:#8aa0bd; --gold:#c8aa6e; --gold2:#f0e6d2;
    --opgg:#5383e8; --wiki:#3aa66b; --mayhem:#a855f7;
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#070a11,#0a0e16);
       color:var(--text);font-family:"Segoe UI","Yu Gothic UI",Meiryo,sans-serif}
  header{position:sticky;top:0;z-index:10;background:rgba(10,14,22,.92);
         backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
         padding:16px 20px}
  .title{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{margin:0;font-size:20px;color:var(--gold2);letter-spacing:.5px}
  .sub{color:var(--muted);font-size:13px}
  .tools{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;align-items:center}
  #q{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line);
     color:var(--text);padding:10px 14px;border-radius:10px;font-size:15px;outline:none}
  #q:focus{border-color:var(--gold)}
  .count{color:var(--muted);font-size:13px;white-space:nowrap}
  #mic{flex:0 0 auto;width:44px;height:44px;border-radius:50%;cursor:pointer;
       background:var(--panel);border:1px solid var(--line);color:var(--gold2);
       font-size:18px;line-height:1;transition:.15s}
  #mic:hover{border-color:var(--gold);background:var(--panel2)}
  #clear{flex:0 0 auto;height:44px;padding:0 14px;border-radius:22px;cursor:pointer;
         background:var(--panel);border:1px solid var(--line);color:var(--muted);
         font-size:13px;font-weight:600;transition:.15s}
  #clear:hover{border-color:var(--gold);color:var(--gold2);background:var(--panel2)}
  #mic.on{background:#c0392b;border-color:#e74c3c;color:#fff;
          animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.55)}
                   50%{box-shadow:0 0 0 10px rgba(231,76,60,0)}}
  .vstatus{min-height:18px;margin-top:8px;font-size:13px;color:var(--muted)}
  .vstatus b{color:var(--gold2)}
  main{padding:18px 20px 60px}
  .grid{display:grid;gap:12px;
        grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
  .rowsep{grid-column:1/-1;display:flex;align-items:center;gap:12px;
          color:var(--gold);font-weight:700;font-size:15px;margin:10px 2px 0}
  .rowsep::after{content:"";flex:1;height:1px;
          background:linear-gradient(90deg,var(--gold),transparent)}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));
        border:1px solid var(--line);border-radius:14px;padding:12px;
        display:flex;flex-direction:column;gap:10px;transition:.15s}
  .card:hover{border-color:var(--gold);transform:translateY(-2px)}
  .head{display:flex;gap:10px;align-items:center}
  .head img{width:52px;height:52px;border-radius:10px;border:1px solid var(--line);background:#000}
  .names{min-width:0}
  .jp{font-size:16px;font-weight:700;color:var(--gold2);line-height:1.2;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .en{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .links{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .links a{display:flex;align-items:center;justify-content:center;text-decoration:none;
           font-size:12px;font-weight:600;padding:9px 2px;border-radius:9px;
           white-space:nowrap;border:1px solid transparent;transition:.12s}
  .opgg{background:rgba(83,131,232,.14);color:#9bbcff;border-color:rgba(83,131,232,.4)}
  .opgg:hover{background:var(--opgg);color:#fff}
  .mayhem{background:rgba(168,85,247,.14);color:#d4a8ff;border-color:rgba(168,85,247,.4)}
  .mayhem:hover{background:var(--mayhem);color:#fff}
  .wiki{background:rgba(58,166,107,.14);color:#7fe0ab;border-color:rgba(58,166,107,.4)}
  .wiki:hover{background:var(--wiki);color:#fff}
  .combo{background:rgba(200,170,110,.16);color:var(--gold2);border-color:rgba(200,170,110,.5)}
  .combo:hover{background:var(--gold);color:#17120a}
  .empty{color:var(--muted);text-align:center;padding:40px;font-size:15px}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:24px;line-height:1.8}
  footer a{color:var(--gold)}
</style>
</head>
<body>
<header>
  <div class="title">
    <h1>LoL チャンピオン リンク集</h1>
    <span class="sub">ARAM ビルド (op.gg) ＆ 日本語Wiki — Patch 16.14.1</span>
  </div>
  <div class="tools">

    <span class="count" id="count"></span>

  <div id="vstatus" class="vstatus"></div>
</header>
<main>

</main>

</footer>

/* ---- 音声検索: 話しかけたチャンピオンの op.gg を開く ---- */
const mic=document.getElementById('mic'), vstatus=document.getElementById('vstatus');
const setV=h=>{vstatus.innerHTML=h;};
// 平仮名→片仮名・記号/空白除去で照合キー化（音声認識のゆれを吸収）
const kata=s=>s.replace(/[ぁ-ゖ]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60));
const key=s=>kata(low(s)).replace(/[\s　ー・'’`.,&-]/g,'').replace(/[^0-9a-z゠-ヿ]/g,'');
function matchChampion(text){
  const t=key(text); if(t.length<2) return null;
  // 誤爆防止：完全一致 or「ほぼ名前全体」の前方一致のみ採用（名前の途中に含むだけの一致は不可）
  const near=(a,b)=>Math.min(a.length,b.length)>=Math.max(a.length,b.length)-2; // 長さがほぼ同じ
  let best=null, score=1e9;
  for(const c of CHAMPS){
    const j=key(c.jp), e=key(c.en);
    let s=null;
    if(j===t||e===t) s=0;                                                            // 完全一致
    else if(t.length>=3 && j && (j.startsWith(t)||t.startsWith(j)) && near(j,t)) s=1; // 日本語の前方一致
    else if(t.length>=4 && e.length>=4 && (e.startsWith(t)||t.startsWith(e)) && near(e,t)) s=2; // 英語の前方一致
    if(s!=null&&s<score){score=s;best=c;}
  }
  return best;
}
// 編集距離（レーベンシュタイン）
function lev(a,b){
  const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  let prev=Array.from({length:n+1},(_, i)=>i),cur=new Array(n+1);
  for(let i=1;i<=m;i++){ cur[0]=i;
    for(let j=1;j<=n;j++){
      cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));
    }
    [prev,cur]=[cur,prev];
  }
  return prev[n];
}
// 一致しなくても最も音が近いチャンピオンを返す（複数候補から最良）
function nearestChampion(texts){
  let best=null,score=1e9;
  for(const text of texts){
    const t=key(text); if(!t) continue;
    for(const c of CHAMPS){
      const d=lev(t,key(c.jp));
      if(d<score){score=d;best=c;}
    }
  }
  return best;
}

  let rec=null;
  function stopRec(){
    if(!rec) return;
    rec.onresult=rec.onerror=rec.onend=null; // 遅延イベントがUIや次回を壊さないよう切り離す

  }
  mic.addEventListener('click',()=>{

    const r=new SR(); rec=r;
    r.lang='ja-JP'; r.interimResults=false; r.maxAlternatives=6;
    mic.classList.add('on'); setV('🎙️ 聞き取り中… チャンピオン名を話してください');
    r.onresult=e=>{
      const alts=[...e.results[0]].map(x=>x.transcript);
      let champ=null; for(const a of alts){ champ=matchChampion(a); if(champ) break; }
      if(champ){
        if(openOpgg(champ)){ q.value=''; filter(); setV('→ <b>'+champ.jp+'</b> を別タブで開きました（検索はクリア）'); } // 元ページは残し検索BOXを消す
        else { q.value=champ.jp; filter(); setV('<b>'+champ.jp+'</b>：ポップアップがブロックされました。アドレスバー右の通知から「このサイトのポップアップを常に許可」に設定すると、次回から新タブで開きます'); }
      } else { // 一致なし：最も近いキャラの先頭1文字だけを検索BOXに入れて候補を絞る
        const near=nearestChampion(alts);
        q.value=near?near.jp.slice(0,1):''; filter();
        setV(near?('一致なし。近い「<b>'+near.jp+'</b>」の先頭1文字で絞り込みました'):('「'+alts[0]+'」に一致するチャンピオンが見つかりませんでした'));
      }
    };
    r.onerror=e=>{ mic.classList.remove('on'); setV('音声認識エラー: '+e.error+(e.error==='not-allowed'?'（マイクの使用を許可してください）':'')); };
    r.onend=()=>{ mic.classList.remove('on'); if(rec===r) rec=null; };
    try{ r.start(); }catch(_){ mic.classList.remove('on'); rec=null; setV('開始できませんでした。もう一度マイクを押してください'); }
  });
}
</script>
